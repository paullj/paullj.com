# fly.toml app configuration file generated for paullj-ssh on 2026-03-20T20:05:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paullj-ssh'
primary_region = 'lhr'

[build]

[[mounts]]
source = 'paullj_ssh_data'
destination = '/data/keys'

[http_service]
internal_port = 2222
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[services]]
protocol = 'tcp'
internal_port = 2222
auto_stop_machines = 'stop'
auto_start_machines = true

[[services.ports]]
port = 22

[[vm]]
memory = '512mb'
cpus = 1
memory_mb = 512
