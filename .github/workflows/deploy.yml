name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  MISE_AUTO_INSTALL: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install flyctl

      - name: Deploy to Fly
        run: mise exec -- flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
