name: Deploy HTTP

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  MISE_AUTO_INSTALL: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-http
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install node pnpm

      - name: Install dependencies
        run: cd http && mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: cd http && mise exec -- pnpm build
        env:
          PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy http/dist --project-name=paullj-com
