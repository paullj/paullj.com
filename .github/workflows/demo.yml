name: Demo GIF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Build server
        run: mise run build

      - name: Start server
        run: |
          ./ssh.paullj.com &
          sleep 2

      - name: Install vhs
        run: |
          mise install vhs ffmpeg

      - name: Generate demo GIF
        run: |
          mise exec -- vhs docs/demo.tape

      - name: Commit demo GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif
          if git diff --cached --quiet; then
            echo "No changes to demo.gif"
          else
            git commit -m "chore: update demo gif"
            git push
          fi
