name: CI

on:
  pull_request:
    branches: [main]

env:
  GOMODCACHE: /home/runner/.cache/go-mod
  MISE_AUTO_INSTALL: false

jobs:
  format-ssh:
    name: Format SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go gofumpt

      - name: Format check
        run: |
          cd ssh
          output=$(mise exec -- gofumpt -d .)
          if [ -n "$output" ]; then
            echo "$output"
            echo 'needs formatting'
            exit 1
          fi

  lint-ssh:
    name: Lint SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go golangci-lint

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Lint
        run: cd ssh && mise exec -- golangci-lint run ./...

  test-ssh:
    name: Test SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Test
        run: cd ssh && mise exec -- go test ./...

  build-ssh:
    name: Build SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Build
        run: cd ssh && mise exec -- go build -o ../ssh.paullj.com ./cmd/ssh.paullj.com

  build-http:
    name: Build HTTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install node pnpm

      - name: Install dependencies
        run: cd http && mise exec -- pnpm install --frozen-lockfile

      - name: Install Playwright
        run: cd http && mise exec -- pnpm exec playwright install --with-deps chromium

      - name: Build
        run: cd http && mise exec -- pnpm build
