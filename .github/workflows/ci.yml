name: CI

on:
  pull_request:
    branches: [main]

env:
  GOMODCACHE: /home/runner/.cache/go-mod
  MISE_AUTO_INSTALL: false

jobs:
  check-ssh:
    name: Check SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go gofumpt golangci-lint

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Lint + format check
        run: mise run ssh:check

  test-ssh:
    name: Test SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Test
        run: mise run ssh:test

  build-ssh:
    name: Build SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - uses: actions/cache@v4
        with:
          path: |
            /home/runner/.cache/go-mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('ssh/go.sum') }}
          restore-keys: go-

      - name: Build
        run: mise run ssh:build

  check-http:
    name: Check HTTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install node pnpm

      - name: Install dependencies
        run: cd http && mise exec -- pnpm install --frozen-lockfile

      - name: Lint + format check
        run: mise run http:check

  build-http:
    name: Build HTTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install node pnpm

      - name: Install dependencies
        run: cd http && mise exec -- pnpm install --frozen-lockfile

      - name: Install Playwright
        run: cd http && mise exec -- pnpm exec playwright install --with-deps chromium

      - name: Build
        run: mise run http:build
