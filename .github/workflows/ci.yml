name: CI

on:
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go gofumpt

      - name: Format check
        run: cd ssh && mise exec -- gofumpt -d . | grep -q . && echo 'needs formatting' && exit 1 || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go golangci-lint

      - name: Lint
        run: cd ssh && mise exec -- golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - name: Test
        run: cd ssh && mise exec -- go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: false

      - run: mise install go

      - name: Build
        run: cd ssh && mise exec -- go build -o ../ssh.paullj.com ./cmd/ssh.paullj.com
